server:
  address: ${SERVER_ADDRESS:127.0.0.1}
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: personal-blog
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/personal_blog}
    username: ${SPRING_DATASOURCE_USERNAME:personal_blog}
    password: ${SPRING_DATASOURCE_PASSWORD:change-me}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

blog:
  admin:
    username: ${ADMIN_USERNAME:admin}
    password: ${ADMIN_PASSWORD:change-me-before-deploy}
  session:
    cookie-secure: ${SESSION_COOKIE_SECURE:false}
