spring:
  datasource:
    url: jdbc:h2:mem:personal_blog_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

blog:
  admin:
    username: admin
    password: secret
  session:
    cookie-secure: false
  uploads:
    dir: ${java.io.tmpdir}/personal-blog-test-uploads
